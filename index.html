<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CalcTokens - Clickmassa</title>
  <style>
    :root {
      --cm-blue: #0d6efd;
      --cm-blue-strong: #0057d9;
      --cm-blue-soft: #eaf2ff;
      --cm-black: #05070b;
      --cm-black-2: #0d1117;
      --cm-white: #ffffff;
      --cm-gray-50: #f5f8ff;
      --cm-gray-100: #e9eef8;
      --cm-gray-200: #d6deee;
      --cm-gray-300: #b6c2d9;
      --cm-text: #0f1728;
      --cm-text-soft: #5b667a;
      --cm-success-shadow: 0 18px 50px rgba(13, 110, 253, 0.18);
      --cm-card-shadow: 0 16px 40px rgba(3, 10, 24, 0.18);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 12px;
      --radius-sm: 10px;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 32px 20px;
      background:rgba(13, 110, 253, 0.16);
      color: var(--cm-text);
      min-height: 100vh;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      background: linear-gradient(180deg, rgba(255,255,255,0.98) 0%, rgba(248,250,255,0.98) 100%);
      padding: 32px;
      border-radius: var(--radius-xl);
      box-shadow: var(--cm-card-shadow);
      border: 1px solid rgba(255,255,255,0.65);
      position: relative;
      overflow: hidden;
    }

    .container::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 6px;
      background: linear-gradient(90deg, #ffffff 0%, var(--cm-blue) 35%, #111111 100%);
    }

    h2 {
      text-align: center;
      color: var(--cm-black);
      margin: 6px 0 24px;
      font-size: 2rem;
      letter-spacing: -0.03em;
    }

    .sub {
      margin-top: 28px;
      margin-bottom: 18px;
      font-size: 1.1rem;
      color: var(--cm-black);
      border-top: 1px solid var(--cm-gray-200);
      padding-top: 24px;
      position: relative;
    }

    .sub::after {
      content: "";
      display: block;
      width: 68px;
      height: 4px;
      margin-top: 10px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--cm-blue), #111111);
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-row {
      display: flex;
      gap: 12px;
      align-items: end;
    }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--cm-black);
      font-size: 0.96rem;
    }

    input,
    select {
      width: 100%;
      padding: 14px 15px;
      border: 1px solid var(--cm-gray-200);
      border-radius: 14px;
      font-size: 1rem;
      background: var(--cm-white);
      color: var(--cm-text);
      transition: border-color .2s ease, box-shadow .2s ease, transform .2s ease, background .2s ease;
      outline: none;
    }

    input::placeholder {
      color: #8a95a8;
    }

    input:focus,
    select:focus {
      border-color: var(--cm-blue);
      box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.12);
      transform: translateY(-1px);
      background: #fcfdff;
    }

    .hidden { display: none; }

    .legenda {
      font-size: 0.9rem;
      color: var(--cm-text-soft);
      margin-top: 8px;
      line-height: 1.45;
    }

    .result {
      background: linear-gradient(135deg, #09111f 0%, #0d182c 48%, #0d6efd 180%);
      color: var(--cm-white);
      border: 1px solid rgba(13, 110, 253, 0.28);
      padding: 20px;
      border-radius: 18px;
      line-height: 1.6;
      box-shadow: var(--cm-success-shadow);
    }

    .result strong { color: #ffffff; }
    .result em { color: #d8e6ff; }
    .result .legenda { color: #d8e6ff; }
    .result hr {
      border-top: 1px solid rgba(255,255,255,0.18) !important;
    }

    .checkboxes {
      display: flex;
      gap: 18px;
      align-items: center;
      flex-wrap: wrap;
      background: var(--cm-gray-50);
      border: 1px solid var(--cm-gray-200);
      padding: 16px 18px;
      border-radius: 16px;
    }

    .checkboxes label {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0;
      font-weight: 600;
      color: var(--cm-text);
      cursor: pointer;
    }

    .checkboxes input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--cm-blue);
      padding: 0;
      border-radius: 4px;
      box-shadow: none;
      transform: none;
    }

    #campos_texto,
    #campos_audio,
    .form-grid,
    #packs_transcricao,
    #packs_voz {
      background: rgba(255,255,255,0.72);
      border: 1px solid var(--cm-gray-100);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 8px 24px rgba(11, 18, 32, 0.05);
    }

    #campos_audio.hidden,
    #packs_transcricao.hidden,
    #packs_voz.hidden {
      display: none;
    }

    @media (max-width: 720px) {
      body {
        padding: 18px 12px;
      }

      .container {
        padding: 22px 18px;
        border-radius: 20px;
      }

      h2 {
        font-size: 1.65rem;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .form-row,
      .checkboxes {
        flex-direction: column;
        align-items: stretch;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Calculadora de Tokens para IA</h2>

    <!-- CONVERSOR ORIGINAL -->
    <div class="form-group">
      <label for="tipo">Tipo de Token:</label>
      <select id="tipo">
        <option value="texto">Texto Simples</option>
        <option value="audio_audio">Texto para Áudio</option>
        <option value="audio_texto">Áudio para Texto</option>
      </select>
    </div>

    <div id="campos_texto" class="form-group">
      <label>Quantidade de Tokens:</label>
      <input type="text" id="qt_texto" placeholder="Digite a quantidade de tokens" />
      <div id="legenda_tokens" class="legenda"></div>

      <label>Valor (R$):</label>
      <input type="number" id="valor_texto" placeholder="Digite o valor em reais" step="0.01" />
    </div>

    <div id="campos_audio" class="hidden">
      <label>Quantidade de Tokens:</label>
      <input type="text" id="qt_audio" placeholder="Digite a quantidade de tokens" />
      <div id="legenda_tokens_audio" class="legenda"></div>

      <label>Minutos de Áudio:</label>
      <input type="number" id="min_audio" placeholder="Digite os minutos" />

      <label>Valor (R$):</label>
      <input type="number" id="valor_audio" placeholder="Digite o valor em reais" step="0.01" />
    </div>

    <!-- NOVA SESSÃO: CONSUMO MENSAL -->
    <h3 class="sub">Consumo Mensal (estimativa)</h3>
    <div class="form-grid">
      <div class="form-group">
        <label for="media_tokens">Média de tokens por interação</label>
        <input type="text" id="media_tokens" value="3.500" />
        <div class="legenda">Use 3.000 a 4.000 tokens por interação, se preferir.</div>
      </div>

      <div class="form-group">
        <label for="interacoes">Interações por atendimento</label>
        <input type="number" id="interacoes" min="1" value="6" />
      </div>

      <div class="form-group">
        <label for="qtd_atend">Quantidade de atendimentos</label>
        <input type="text" id="qtd_atend" value="500" />
      </div>

      <div class="form-group">
        <label for="periodo">Período</label>
        <select id="periodo">
          <option value="dia">por dia</option>
          <option value="mes">por mês</option>
        </select>
      </div>
    </div>

    <div class="form-group checkboxes">
      <label><input type="checkbox" id="chk_transcricao" /> Incluir Transcrição (Áudio → Texto)</label>
      <label><input type="checkbox" id="chk_voz" /> Incluir Voz (Texto → Áudio)</label>
    </div>

    <div id="packs_transcricao" class="form-row hidden">
      <div class="form-group" style="flex:1">
        <label for="pacotes_stt">Pacotes de Transcrição (1.000 min cada)</label>
        <input type="number" id="pacotes_stt" min="0" value="0" />
        <div class="legenda">Preço usado: R$150 por 1.000 min</div>
      </div>
    </div>

    <div id="packs_voz" class="form-row hidden">
      <div class="form-group" style="flex:1">
        <label for="pacotes_tts">Pacotes de Voz (100 min cada)</label>
        <input type="number" id="pacotes_tts" min="0" value="0" />
        <div class="legenda">Preço usado: R$150 por 100 min</div>
      </div>
    </div>

    <div class="form-group">
      <div class="result" id="resumo_mensal">
        Preencha os campos acima para ver a estimativa mensal.
      </div>
    </div>
  </div>

  <script>
    // ===== Helpers
    const tipo = document.getElementById("tipo");
    const camposTexto = document.getElementById("campos_texto");
    const camposAudio = document.getElementById("campos_audio");

    const qtTexto = document.getElementById("qt_texto");
    const valorTexto = document.getElementById("valor_texto");
    const legendaTokens = document.getElementById("legenda_tokens");

    const qtAudio = document.getElementById("qt_audio");
    const minAudio = document.getElementById("min_audio");
    const valorAudio = document.getElementById("valor_audio");
    const legendaTokensAudio = document.getElementById("legenda_tokens_audio");

    // Nova sessão – elementos
    const mediaTokens = document.getElementById("media_tokens");
    const interacoes = document.getElementById("interacoes");
    const qtdAtend = document.getElementById("qtd_atend");
    const periodo = document.getElementById("periodo");
    const chkTransc = document.getElementById("chk_transcricao");
    const chkVoz = document.getElementById("chk_voz");
    const packsTransc = document.getElementById("packs_transcricao");
    const packsVoz = document.getElementById("packs_voz");
    const pacotesSTT = document.getElementById("pacotes_stt");
    const pacotesTTS = document.getElementById("pacotes_tts");
    const resumoMensal = document.getElementById("resumo_mensal");

    const PRECO_MILHAO_TOKENS = 15; // R$15 por 1.000.000 tokens
    const PRECO_100_MIN = 15;       // base do conversor original
    const TOKENS_POR_MIN = 0.36;    // base original

    function parseFormattedNumber(value) {
      if (typeof value === "number") return value;
      return parseFloat(String(value).replace(/\./g, '').replace(',', '.')) || 0;
    }
    function formatNumber(value) {
      return Number(value).toLocaleString('pt-BR', {
        minimumFractionDigits: 0, maximumFractionDigits: 2
      });
    }
    function numberToWords(valor) {
      valor = Math.floor(valor);
      if (valor >= 1_000_000_000) {
        const bi = Math.floor(valor / 1_000_000_000);
        return `${bi} ${bi === 1 ? 'bilhão' : 'bilhões'}`;
      } else if (valor >= 1_000_000) {
        const mi = Math.floor(valor / 1_000_000);
        return `${mi} ${mi === 1 ? 'milhão' : 'milhões'}`;
      } else if (valor >= 1000) {
        const mil = Math.floor(valor / 1000);
        return `${mil} mil`;
      } else {
        return `${valor}`;
      }
    }

    // ===== Conversor original
    tipo.addEventListener("change", () => {
      qtTexto.value = qtAudio.value = minAudio.value = valorTexto.value = valorAudio.value = "";
      legendaTokens.textContent = legendaTokensAudio.textContent = "";
      if (tipo.value === "texto") {
        camposTexto.classList.remove("hidden");
        camposAudio.classList.add("hidden");
      } else {
        camposTexto.classList.add("hidden");
        camposAudio.classList.remove("hidden");
        calcAudio(tipo.value);
      }
    });

    qtTexto.addEventListener("input", () => {
      const num = parseFormattedNumber(qtTexto.value);
      valorTexto.value = (num / 1_000_000 * PRECO_MILHAO_TOKENS).toFixed(2);
      qtTexto.value = formatNumber(num);
      legendaTokens.textContent = `(${num.toLocaleString('pt-BR')} = ${numberToWords(num)})`;
      atualizarResumoMensal();
    });

    valorTexto.addEventListener("input", () => {
      const valor = parseFloat(valorTexto.value) || 0;
      const quantidade = Math.round(valor / PRECO_MILHAO_TOKENS * 1_000_000);
      qtTexto.value = formatNumber(quantidade);
      legendaTokens.textContent = `(${quantidade.toLocaleString('pt-BR')} = ${numberToWords(quantidade)})`;
      atualizarResumoMensal();
    });

    // >>> mantém a lógica original do conversor (sem remover nada), só garante listeners corretos
    function calcAudio(tipoAudio) {
      const preco = PRECO_100_MIN;                   // R$15 por "bloco" base
      const minutosPorPreco = (tipoAudio === "audio_audio") ? 10 : 100; // TTS=10min, STT=100min
      const tokensPorMinuto = TOKENS_POR_MIN;

      // limpa campos/legenda ao trocar de modo
      qtAudio.value = ""; minAudio.value = ""; valorAudio.value = ""; legendaTokensAudio.textContent = "";

      // Handlers substituídos (evita empilhar listeners)
      qtAudio.oninput = () => {
        const tokens = parseFormattedNumber(qtAudio.value);
        const minutos = tokens / tokensPorMinuto;
        minAudio.value = minutos.toFixed(2);
        valorAudio.value = ((minutos / minutosPorPreco) * preco).toFixed(2);
        qtAudio.value = formatNumber(tokens);
        legendaTokensAudio.textContent = `(${tokens.toLocaleString('pt-BR')} = ${numberToWords(tokens)})`;
        atualizarResumoMensal();
      };

      valorAudio.oninput = () => {
        const valor = parseFloat(valorAudio.value) || 0;
        const minutos = (valor / preco) * minutosPorPreco;
        const tokens = minutos * tokensPorMinuto;
        minAudio.value = minutos.toFixed(2);
        qtAudio.value = formatNumber(tokens);
        legendaTokensAudio.textContent = `(${tokens.toLocaleString('pt-BR')} = ${numberToWords(tokens)})`;
        atualizarResumoMensal();
      };

      minAudio.oninput = () => {
        const minutos = parseFloat(minAudio.value) || 0;
        const tokens = minutos * tokensPorMinuto;
        const valor = (minutos / minutosPorPreco) * preco;
        qtAudio.value = formatNumber(tokens);
        valorAudio.value = valor.toFixed(2);
        legendaTokensAudio.textContent = `(${tokens.toLocaleString('pt-BR')} = ${numberToWords(tokens)})`;
        atualizarResumoMensal();
      };
    }

    // Inicializa com tipo padrão
    calcAudio("audio_audio");

    // ===== Consumo Mensal
    function calcularTokensMensais() {
      const media = parseFormattedNumber(mediaTokens.value) || 0;
      const inter = parseInt(interacoes.value || "0", 10);
      const qtd = parseFormattedNumber(qtdAtend.value) || 0;
      const fatorPeriodo = (periodo.value === "dia") ? 30 : 1;
      const totalTokens = media * inter * qtd * fatorPeriodo; // média × interações × atendimentos × (×30 se por dia)
      const custoTokens = (totalTokens / 1_000_000) * PRECO_MILHAO_TOKENS;
      return { totalTokens, custoTokens };
    }

    function calcularAudioExtras() {
      // Transcrição (Áudio -> Texto) – pacotes de 1.000 min | R$150 cada
      const incluirSTT = chkTransc.checked;
      const qtdPacksSTT = parseInt(pacotesSTT.value || "0", 10);
      const custoSTT = incluirSTT ? (qtdPacksSTT * 150) : 0;

      // Voz (Texto -> Áudio) – pacotes de 100 min | R$150 cada
      const incluirTTS = chkVoz.checked;
      const qtdPacksTTS = parseInt(pacotesTTS.value || "0", 10);
      const custoTTS = incluirTTS ? (qtdPacksTTS * 150) : 0;

      return { custoSTT, custoTTS, qtdPacksSTT, qtdPacksTTS, incluirSTT, incluirTTS };
    }

    function atualizarResumoMensal() {
      const { totalTokens, custoTokens } = calcularTokensMensais();
      const { custoSTT, custoTTS, qtdPacksSTT, qtdPacksTTS, incluirSTT, incluirTTS } = calcularAudioExtras();
      const custoTotal = custoTokens + custoSTT + custoTTS;

      const tokensFmt = totalTokens.toLocaleString('pt-BR');
      const tokensExtenso = numberToWords(totalTokens);
      const custoTokensFmt = custoTokens.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      const custoSTTFmt = custoSTT.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      const custoTTSFmt = custoTTS.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      const custoTotalFmt = custoTotal.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

      let extras = '';
      if (incluirSTT) extras += `<br>• Transcrição: ${qtdPacksSTT} × (1.000 min) = <strong>R$ ${custoSTTFmt}</strong>`;
      if (incluirTTS) extras += `<br>• Voz: ${qtdPacksTTS} × (100 min) = <strong>R$ ${custoTTSFmt}</strong>`;

      resumoMensal.innerHTML = `
        <strong>Tokens/mês (estimado):</strong> ${tokensFmt} (<em>${tokensExtenso}</em>)<br>
        <strong>Custo de tokens:</strong> R$ ${custoTokensFmt}
        ${extras || ''}
        <hr style="border:none;border-top:1px solid #e6edf5;margin:.75rem 0;">
        <strong>Total estimado/mês:</strong> R$ ${custoTotalFmt}
        <div class="legenda" style="margin-top:.5rem">
          Fórmula: média_tokens × interações × atendimentos × período${periodo.value === 'dia' ? ' (×30)' : ''}.<br>
          Preços usados: R$15/M tokens; Transcrição: R$15/100 min; Voz: R$150/100 min.
        </div>
      `;
    }

    // Eventos da sessão mensal
    [mediaTokens, interacoes, qtdAtend].forEach(el => {
      el.addEventListener('input', () => {
        if (el === mediaTokens || el === qtdAtend) {
          const raw = parseFormattedNumber(el.value);
          el.value = raw ? formatNumber(raw) : '';
        }
        atualizarResumoMensal();
      });
    });
    periodo.addEventListener('change', atualizarResumoMensal);

    chkTransc.addEventListener('change', () => {
      packsTransc.classList.toggle('hidden', !chkTransc.checked);
      atualizarResumoMensal();
    });
    chkVoz.addEventListener('change', () => {
      packsVoz.classList.toggle('hidden', !chkVoz.checked);
      atualizarResumoMensal();
    });
    pacotesSTT.addEventListener('input', atualizarResumoMensal);
    pacotesTTS.addEventListener('input', atualizarResumoMensal);

    // Inicializa resumo
    atualizarResumoMensal();
  </script>
</body>
</html>
